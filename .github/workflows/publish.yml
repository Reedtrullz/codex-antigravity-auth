name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build distribution artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install packaging tools
        run: python -m pip install --upgrade pip build twine

      - name: Verify tag matches package version
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          tag = os.environ.get("GITHUB_REF_NAME", "")
          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(f"Tag {tag!r} does not match pyproject version {version!r}; expected {expected!r}")
          PY

      - name: Build artifacts
        run: python -m build --sdist --wheel

      - name: Check artifact metadata
        run: python -m twine check dist/*

      - name: Verify package contents and installed CLI
        run: |
          python - <<'PY'
          import pathlib
          import zipfile

          wheel = next(pathlib.Path("dist").glob("*.whl"))
          required = {
              "codex_antigravity_auth/skills/anti/SKILL.md",
              "codex_antigravity_auth/skills/anti/agents/openai.yaml",
              "codex_antigravity_auth/skills/anti/scripts/anti.py",
              "codex_antigravity_auth/skills/anti/scripts/anti_lib/__init__.py",
              "codex_antigravity_auth/skills/anti/scripts/anti_lib/chunking.py",
              "codex_antigravity_auth/skills/anti/scripts/anti_lib/context.py",
              "codex_antigravity_auth/skills/anti/scripts/anti_lib/ledger.py",
              "codex_antigravity_auth/skills/anti/scripts/anti_lib/redaction.py",
              "codex_antigravity_auth/skills/anti/scripts/anti_lib/runner.py",
              "codex_antigravity_auth/skills/anti/tests/test_anti.py",
          }
          with zipfile.ZipFile(wheel) as archive:
              missing = sorted(required - set(archive.namelist()))
          if missing:
              raise SystemExit(f"Required Anti package assets missing: {missing}")
          PY
          python -m venv /tmp/codex-antigravity-publish-wheel
          /tmp/codex-antigravity-publish-wheel/bin/python -m pip install dist/*.whl
          /tmp/codex-antigravity-publish-wheel/bin/codex-antigravity --help
          /tmp/codex-antigravity-publish-wheel/bin/codex-antigravity doctor --help
          /tmp/codex-antigravity-publish-wheel/bin/codex-antigravity provider presets
          HOME=/tmp/codex-antigravity-publish-home /tmp/codex-antigravity-publish-wheel/bin/codex-antigravity install-skill --verify

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          name: python-distributions
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
